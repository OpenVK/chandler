chandler:
    debug: true
    websiteUrl: null
    rootApp:    "root"
    
    preferences:
        appendExtension: "xhtml"
        adminUrl: "/chandlerd"
        exposeChandler: true
        logs:
            enabled: true
            entitiesNamespace: "openvk\\Web\\Models\\Entities\\"
    
    extensions:
        path: null
        allEnabled: false
    
    database:
        dsn: "mysql:host=localhost;dbname=db"
        user: "root"
        password: "root"
    
    security:
        secret: ""
        csrfProtection: "permissive"
        extendedValidation: false
        sessionDuration: 14

    email:
        host: "mail.example.com"
        port: 465
        user: "user"
        pass: "word"
        addr: "noreply@example.com"
        ssl: true

    redisUrl: "tcp://10.0.0.1:6379"
